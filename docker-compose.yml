services:
  ollama:
    image: ollama/ollama:latest
    container_name: yad2bot-ollama
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: yad2bot-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-smollm2:135m}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"

  bot:
    build: ./bot
    container_name: yad2bot-bot
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-smollm2:135m}
      YAD2_URL: ${YAD2_URL:-https://www.yad2.co.il/realestate/rent}
      SCRAPE_INTERVAL_MIN: ${SCRAPE_INTERVAL_MIN:-60}
      JITTER_MIN: ${JITTER_MIN:-7}
    volumes:
      - bot_state:/app/state
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
  bot_state:
